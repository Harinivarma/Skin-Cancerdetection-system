# ======================================================
# SERVER CONFIG
# ======================================================
server.port=9090
spring.main.allow-bean-definition-overriding=true

# ======================================================
# FILE UPLOAD CONFIG
# ======================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ======================================================
# PYTHON FLASK API URL
# (Your Python model prediction API)
# ======================================================
python.api.url=http://127.0.0.1:5000/predict

# ======================================================
# CORS (allow frontend calls)
# ======================================================
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*

# ======================================================
# MySQL DATABASE (Optional - Phase 4)
# Uncomment later when you add MySQL
# ======================================================
 spring.datasource.url=jdbc:mysql://localhost:3306/skincare
 spring.datasource.username=root
 spring.datasource.password=harini18
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 spring.jpa.hibernate.ddl-auto=update
 spring.jpa.show-sql=true
 spring.security.user.name=admin
spring.security.user.password=admin123
