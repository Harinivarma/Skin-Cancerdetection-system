<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detection Result</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <section class="result-section">
        <h2>Detection Result</h2>
        <img id="resultImage" src="#" alt="Uploaded Image">
        <p id="prediction"></p>
        <p id="confidence"></p>
        <a href="upload.html" class="btn">Try Another Image</a>
    </section>

    <script>
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            });

        // Optional: retrieve data from localStorage if redirecting from upload.html
        const pred = localStorage.getItem('prediction');
        const conf = localStorage.getItem('confidence');
        const imgSrc = localStorage.getItem('imageSrc');

        if(pred && conf && imgSrc){
            document.getElementById('prediction').innerText = "Prediction: " + pred;
            document.getElementById('confidence').innerText = "Confidence: " + conf;
            document.getElementById('resultImage').src = imgSrc;
        }
    </script>
</body>
</html>
